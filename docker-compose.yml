services:
  app:
    build: .
    ports:
      - '3001:3001'
    environment:
      NODE_ENV: production
      PORT: 3001
      MONGODB_URI: mongodb://mongo:27017/neural-chat
    depends_on:
      mongo:
        condition: service_started

  mongo:
    image: mongo:7.0
    restart: always
    volumes:
      - mongo-data:/data/db
    ports:
      - '27017:27017'

volumes:
  mongo-data:
